<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christian's Photos — Photography</title>

  <!-- Fonts: Cormorant Garamond (display) + DM Sans (utility) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Tokens ─── */
    :root {
      --sand:      #F2EDE6;
      --dusk:      #C9B9A8;
      --ember:     #A0714F;
      --charcoal:  #2B2622;
      --mist:      #8C7B6E;
      --white:     #FDFAF7;

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui:      'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--charcoal);
      color: var(--sand);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.03em;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: linear-gradient(to bottom, rgba(43,38,34,0.95), transparent);
    }

    .site-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    nav a {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dusk);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--white); }

    /* ─── Filter Bar ─── */
    .filter-bar {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 6px;
      background: rgba(43,38,34,0.72);
      border: 1px solid rgba(201,185,168,0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 8px 14px;
    }

    .filter-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mist);
      padding: 6px 14px;
      border-radius: 30px;
      transition: background 0.2s, color 0.2s;
    }
    .filter-btn:hover { color: var(--sand); }
    .filter-btn.active {
      background: var(--ember);
      color: var(--white);
    }

    /* ─── Slideshow ─── */
    .slideshow {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide.active { opacity: 1; z-index: 2; }
    .slide.prev   { opacity: 0; z-index: 1; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    /* Gradient overlay at bottom */
    .slide::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(43,38,34,0.7), transparent);
      pointer-events: none;
    }

    /* ─── Slide Caption ─── */
    .slide-caption {
      position: absolute;
      bottom: 100px;
      left: 50px;
      z-index: 10;
      pointer-events: none;
    }

    .slide-caption .category-tag {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ember);
      margin-bottom: 6px;
    }

    .slide-caption .title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 300;
      font-style: italic;
      color: var(--white);
      line-height: 1.1;
    }

    /* ─── Slide Counter ─── */
    .slide-counter {
      position: absolute;
      bottom: 42px;
      right: 50px;
      z-index: 10;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--mist);
    }
    .slide-counter span { color: var(--white); }

    /* ─── Arrow Buttons ─── */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dusk);
      font-size: 2rem;
      padding: 16px 20px;
      transition: color 0.2s;
      line-height: 1;
    }
    .arrow:hover { color: var(--white); }
    .arrow.prev { left: 20px; }
    .arrow.next { right: 20px; }

    /* ─── Lightbox ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(20,16,14,0.96);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 2px;
    }

    .lightbox-meta {
      margin-top: 16px;
      text-align: center;
    }
    .lightbox-meta .cat {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ember);
    }
    .lightbox-meta .ttl {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-style: italic;
      font-weight: 300;
      color: var(--white);
      margin-top: 4px;
    }

    .lightbox-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mist);
      font-size: 1.8rem;
      line-height: 1;
      transition: color 0.2s;
    }
    .lightbox-close:hover { color: var(--white); }

    .lightbox-arrows {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: none;
    }
    .lightbox-arrows button {
      pointer-events: all;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mist);
      font-size: 2rem;
      padding: 12px 18px;
      transition: color 0.2s;
    }
    .lightbox-arrows button:hover { color: var(--white); }

    /* ─── Placeholder images ─── */
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
    }

    .placeholder-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
    }

    .ph-icon {
      width: 48px;
      height: 48px;
      opacity: 0.25;
    }

    .ph-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dusk);
      opacity: 0.5;
    }

    /* placeholder color bands */
    .ph-1 { background: #3D342C; }
    .ph-2 { background: #2E2822; }
    .ph-3 { background: #3A2E26; }
    .ph-4 { background: #332B25; }
    .ph-5 { background: #382F28; }
    .ph-6 { background: #2C2520; }
    .ph-7 { background: #3E352D; }
    .ph-8 { background: #302820; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .slide-caption { left: 24px; bottom: 110px; }
      .arrow { padding: 10px 14px; }
      .filter-bar { padding: 6px 10px; bottom: 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide { transition: none; }
    }
  </style>
</head>
<body>

  <!-- ─── Header ─── -->
  <header>
    <a class="site-name" href="#">Christian's Photos</a>
    <nav>
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- ─── Slideshow ─── -->
  <div class="slideshow" id="slideshow">

    <button class="arrow prev" onclick="move(-1)" aria-label="Previous">&#8592;</button>
    <button class="arrow next" onclick="move(1)"  aria-label="Next">&#8594;</button>

    <!-- SLIDES — replace src="" with your image paths, update data-title and data-category -->
    <!-- To use your own photos: swap src="" for src="your-photo.jpg" -->

    <div class="slide active" data-index="0" data-category="Nature" data-title="Lazy Gronk">
      <img src="lightroom-download-2026-06-11T08_30_20Z/1-DSCF3081.jpg" alt="Lazy Gronk" onclick="openLightbox(0)" />
    </div>

    <div class="slide" data-index="1" data-category="Portraits" data-title="Angry Birds">
      <img src="lightroom-download-2026-06-11T08_30_20Z/2-DSCF3006.jpg" alt="Angry Birds" onclick="openLightbox(1)" />
    </div>

    <div class="slide" data-index="2" data-category="Urban" data-title="Garda">
      <img src="lightroom-download-2026-06-11T08_30_20Z/9-DSCF1216.jpg" alt="Narrow Streets" onclick="openLightbox(2)" />
    </div>

    <div class="slide" data-index="3" data-category="Urban" data-title="Kyoto JDM">
      <img src="lightroom-download-2026-06-11T08_30_20Z/4-DSCF2400.jpg" alt="Kyoto JDM" onclick="openLightbox(3)" />
    </div>

    <div class="slide" data-index="4" data-category="Portraits" data-title="cemetery">
      <img src="lightroom-download-2026-06-11T08_30_20Z/5-DSCF2271.jpg" alt="cemetery" onclick="openLightbox(4)" />
    </div>

    <div class="slide" data-index="5" data-category="Urban" data-title="Yamanouchi">
      <img src="lightroom-download-2026-06-11T08_30_20Z/6-DSCF2136.jpg" alt="Yamanouchi" onclick="openLightbox(5)" />
    </div>

    <div class="slide" data-index="6" data-category="Nature" data-title="Business">
      <img src="lightroom-download-2026-06-11T08_30_20Z/7-DSCF2041.jpg" alt="Business" onclick="openLightbox(6)" />
    </div>

    <div class="slide" data-index="7" data-category="landscapes" data-title="stelvio">
      <img src="lightroom-download-2026-06-11T08_30_20Z/8-DSCF1474.jpg" alt="stelvio" onclick="openLightbox(7)" />
    </div>

    <!-- Slide caption -->
    <div class="slide-caption" id="caption">
      <div class="category-tag" id="cap-category">Portraits</div>
      <div class="title" id="cap-title">Golden Hour</div>
    </div>

    <!-- Counter -->
    <div class="slide-counter">
      <span id="cur">01</span> / <span id="tot">08</span>
    </div>
  </div>

  <!-- ─── Filter Bar ─── -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all"       onclick="setFilter('all', this)">All</button>
    <button class="filter-btn"        data-filter="Portraits" onclick="setFilter('Portraits', this)">Portraits</button>
    <button class="filter-btn"        data-filter="landscapes" onclick="setFilter('landscapes', this)">Landscapes</button>
    <button class="filter-btn"        data-filter="Urban"    onclick="setFilter('Urban', this)">Urban</button>
    <button class="filter-btn"        data-filter="Nature"    onclick="setFilter('Nature', this)">Nature</button>
  </div>

  <!-- ─── Lightbox ─── -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">&#215;</button>
    <img id="lb-img" src="" alt="" />
    <div class="lightbox-meta">
      <div class="cat" id="lb-cat"></div>
      <div class="ttl" id="lb-title"></div>
    </div>
    <div class="lightbox-arrows">
      <button onclick="lbMove(-1)">&#8592;</button>
      <button onclick="lbMove(1)">&#8594;</button>
    </div>
  </div>

  <script>
    // ─── Data ───
    // Update these to match your slides: add/remove entries, change titles, categories, and src paths.
    const photos = [
      { title: "Lazy Gronk",     category: "Nature",  src: "lightroom-download-2026-06-11T08_30_20Z/1-DSCF3081.jpg" },
      { title: "Angry Birds",    category: "Portraits", src: "lightroom-download-2026-06-11T08_30_20Z/2-DSCF3006.jpg" },
      { title: "Garda",  category: "landscapes",     src: "lightroom-download-2026-06-11T08_30_20Z/3-DSCF2524.jpg" },
      { title: "Kyoto JDM", category: "Urban",  src: "lightroom-download-2026-06-11T08_30_20Z/4-DSCF2400.jpg" },
      { title: "Cemetery",category: "Portraits", src: "lightroom-download-2026-06-11T08_30_20Z/5-DSCF2271.jpg" },
      { title: "Yamanouchi",  category: "Urban",     src: "lightroom-download-2026-06-11T08_30_20Z/6-DSCF2136.jpg" },
      { title: "Business", category: "Nature",  src: "lightroom-download-2026-06-11T08_30_20Z/7-DSCF2041.jpg" },
      { title: "stelvio",     category: "landscapes", src: "lightroom-download-2026-06-11T08_30_20Z/8-DSCF1474.jpg" },
    ];

    let current  = 0;
    let filtered = photos.map((_, i) => i); // indices visible in current filter
    let filtPos  = 0; // position within filtered array

    const slides    = document.querySelectorAll('.slide');
    const capCat    = document.getElementById('cap-category');
    const capTitle  = document.getElementById('cap-title');
    const curEl     = document.getElementById('cur');
    const totEl     = document.getElementById('tot');

    function pad(n) { return String(n).padStart(2, '0'); }

    function showSlide(idx) {
      slides.forEach(s => s.classList.remove('active', 'prev'));
      slides[idx].classList.add('active');
      current = idx;

      const p = photos[idx];
      capCat.textContent   = p.category.charAt(0).toUpperCase() + p.category.slice(1);
      capTitle.textContent = p.title;
      filtPos = filtered.indexOf(idx);
      curEl.textContent = pad(filtPos + 1);
      totEl.textContent = pad(filtered.length);
    }

    function move(dir) {
      filtPos = (filtPos + dir + filtered.length) % filtered.length;
      showSlide(filtered[filtPos]);
    }

    function setFilter(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      filtered = cat === 'all'
        ? photos.map((_, i) => i)
        : photos.map((p, i) => p.category === cat ? i : -1).filter(i => i !== -1);

      filtPos = 0;
      showSlide(filtered[0]);
    }

    // ─── Lightbox ───
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbCat    = document.getElementById('lb-cat');
    const lbTitle  = document.getElementById('lb-title');
    let lbIndex    = 0;

    function openLightbox(idx) {
      lbIndex = filtered.indexOf(idx) !== -1 ? filtered.indexOf(idx) : 0;
      renderLightbox();
      lightbox.classList.add('open');
    }

    function renderLightbox() {
      const p = photos[filtered[lbIndex]];
      // If no src, show a warm placeholder canvas
      if (!p.src) {
        lbImg.src = makePlaceholderDataUrl(p.title);
      } else {
        lbImg.src = p.src;
      }
      lbImg.alt    = p.title;
      lbCat.textContent   = p.category.charAt(0).toUpperCase() + p.category.slice(1);
      lbTitle.textContent = p.title;
    }

    function lbMove(dir) {
      lbIndex = (lbIndex + dir + filtered.length) % filtered.length;
      renderLightbox();
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
    }

    // Generate a simple warm placeholder canvas for lightbox
    function makePlaceholderDataUrl(label) {
      const c = document.createElement('canvas');
      c.width = 800; c.height = 520;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#2E2822';
      ctx.fillRect(0, 0, 800, 520);
      ctx.strokeStyle = 'rgba(201,185,168,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(40, 40, 720, 440);
      ctx.fillStyle = 'rgba(201,185,168,0.3)';
      ctx.font = '13px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Replace with your photo', 400, 260);
      ctx.fillStyle = 'rgba(160,113,79,0.6)';
      ctx.font = 'italic 22px Cormorant Garamond, Georgia, serif';
      ctx.fillText(label, 400, 290);
      return c.toDataURL();
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (lightbox.classList.contains('open')) {
        if (e.key === 'ArrowLeft')  lbMove(-1);
        if (e.key === 'ArrowRight') lbMove(1);
        if (e.key === 'Escape')     closeLightbox();
      } else {
        if (e.key === 'ArrowLeft')  move(-1);
        if (e.key === 'ArrowRight') move(1);
      }
    });

    // Auto-advance every 5 seconds
    let timer = setInterval(() => move(1), 5000);
    document.getElementById('slideshow').addEventListener('mouseenter', () => clearInterval(timer));
    document.getElementById('slideshow').addEventListener('mouseleave', () => {
      clearInterval(timer);
      timer = setInterval(() => move(1), 5000);
    });

    // Init
    showSlide(0);
  </script>
</body>
</html>
